version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "deps"

    labels:
      - dependencies
      - automated

    versioning-strategy: increase

    groups:
      development-dependencies:
        dependency-type: development

      production-dependencies:
        dependency-type: production