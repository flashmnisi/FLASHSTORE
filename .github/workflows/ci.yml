name: Flashstore Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      nx-base: ${{ steps.base.outputs.base }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Nx Cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: nx-${{ runner.os }}-

      - name: Determine Base Commit
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "base=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Start Nx Cloud
        run: npx nx start-ci-run --distribute-on="3 linux-medium-js"

  lint-test-build:
    name: Lint, Test & Build
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Lint Affected
        run: npx nx affected -t lint --base=${{ needs.setup.outputs.nx-base }} --head=HEAD --parallel=3 --verbose

      - name: Test Affected
        run: npx nx affected -t test --base=${{ needs.setup.outputs.nx-base }} --head=HEAD --parallel=3 --configuration=ci --verbose

      - name: Build Affected
        run: npx nx affected -t build --base=${{ needs.setup.outputs.nx-base }} --head=HEAD --parallel=3 --verbose