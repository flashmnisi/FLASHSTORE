version: '3.9'

networks:
  flashstore-net:
    driver: bridge

services:
  # ==================== MongoDB ====================
  mongo:
    image: mongo:7
    container_name: flashstore-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: flashstore
    volumes:
      - mongo-data:/data/db
    networks:
      - flashstore-net
    restart: unless-stopped

  # ==================== Kafka (KRaft Mode) ====================
  kafka:
    image: apache/kafka:3.8.0
    container_name: flashstore-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - flashstore-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ==================== Gateway ====================
  gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/gateway.Dockerfile
    container_name: flashstore-gateway
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
      PORT: 3000:3000
    depends_on:
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started  
    networks:
      - flashstore-net
    restart: unless-stopped

  # ==================== User Service ====================
  user-service:
    build:
      context: .
      dockerfile: infrastructure/docker/user-service.Dockerfile
    container_name: flashstore-user-service
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
      PORT: 3001:3001
      MONGO_URI: mongodb://mongo:27017/flashstore-users
    depends_on:
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - flashstore-net
    restart: unless-stopped

  # ==================== Analytics Service ====================
  analytics-service:
    build:
      context: .
      dockerfile: infrastructure/docker/analytics-service.Dockerfile
    container_name: flashstore-analytics-service
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
      PORT: 3007:3007
      MONGO_URI: mongodb://mongo:27017/flashstore-analytics
    depends_on:
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - flashstore-net
    restart: unless-stopped

  # ==================== Nginx (Load Balancer) ====================
  nginx:
    image: nginx:stable-alpine
    container_name: flashstore-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - flashstore-net
    restart: unless-stopped  

volumes:
  mongo-data: