apiVersion: v1
kind: ConfigMap

metadata:
  name: flashstore-config
  namespace: flashstore

data:
  #####################################
  # Environment
  #####################################

  NODE_ENV: "production"

  #####################################
  # Gateway
  #####################################

  API_GATEWAY_PORT: "3000"

  #####################################
  # Service Ports
  #####################################

  USER_SERVICE_PORT: "3001"
  ORDER_SERVICE_PORT: "3002"
  CATALOG_SERVICE_PORT: "3003"
  CART_SERVICE_PORT: "3004"
  PAYMENT_SERVICE_PORT: "3005"
  ANALYTICS_SERVICE_PORT: "3006"
  SEARCH_SERVICE_PORT: "3007"
  INVENTORY_SERVICE_PORT: "3008"
  NOTIFICATION_SERVICE_PORT: "3009"

  #####################################
  # Internal Service URLs
  #####################################

  USER_SERVICE_URL: "http://user-service:3001"
  ORDER_SERVICE_URL: "http://order-service:3002"
  CATALOG_SERVICE_URL: "http://catalog-service:3003"
  CART_SERVICE_URL: "http://cart-service:3004"
  PAYMENT_SERVICE_URL: "http://payment-service:3005"
  ANALYTICS_SERVICE_URL: "http://analytics-service:3006"
  SEARCH_SERVICE_URL: "http://search-service:3007"
  INVENTORY_SERVICE_URL: "http://inventory-service:3008"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3009"

  #####################################
  # MongoDB
  #####################################

  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DB: "flashstore"
  MONGO_URI: "mongodb://mongodb:27017/flashstore"

  #####################################
  # Redis
  #####################################

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://:changemeplease@redis:6379"

  #####################################
  # Kafka
  #####################################

  KAFKA_BROKERS: "kafka:9092"
  KAFKA_CLIENT_ID: "flashstore-app"

  #####################################
  # Email
  #####################################

  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"