apiVersion: v1
kind: ConfigMap

metadata:
  name: flashstore-config
  namespace: flashstore

data:
  #####################################
  # Environment
  #####################################

  NODE_ENV: "production"

  #####################################
  # Gateway
  #####################################

  API_GATEWAY_PORT: "3000"

  #####################################
  # Service Ports
  #####################################

  USER_SERVICE_PORT: "3001"
  ORDER_SERVICE_PORT: "3002"
  CATALOG_SERVICE_PORT: "3003"
  CART_SERVICE_PORT: "3004"
  PAYMENT_SERVICE_PORT: "3005"
  ANALYTICS_SERVICE_PORT: "3006"
  NOTIFICATION_SERVICE_PORT: "3007"
  INVENTORY_SERVICE_PORT: "3008"
  SEARCH_SERVICE_PORT: "4005"

  #####################################
  # Internal Service URLs
  #####################################

  USER_SERVICE_URL: "http://user-service:3001"
  ORDER_SERVICE_URL: "http://order-service:3002"
  CATALOG_SERVICE_URL: "http://catalog-service:3003"
  CART_SERVICE_URL: "http://cart-service:3004"
  PAYMENT_SERVICE_URL: "http://payment-service:3005"
  ANALYTICS_SERVICE_URL: "http://analytics-service:3006"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3007"
  INVENTORY_SERVICE_URL: "http://inventory-service:3008"
  SEARCH_SERVICE_URL: "http://search-service:4005"

  #####################################
  # MongoDB
  #####################################

  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"

  # Shared database server
  MONGO_DB: "flashstore"

  # Analytics database
  ANALYTICS_MONGO_DB: "flashstore-analytics"

  #####################################
  # Redis
  #####################################

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://:changemeplease@redis:6379"

  #####################################
  # Kafka
  #####################################

  KAFKA_BROKERS: "kafka:9092"

  # Shared default
  KAFKA_CLIENT_ID: "flashstore-app"

  # Analytics specific
  ANALYTICS_KAFKA_CLIENT_ID: "analytics-service"

  #####################################
  # Email
  #####################################

  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"

  #####################################
  # Logging
  #####################################

  LOG_LEVEL: "info"

  #####################################
  # Gateway
  #####################################

  SERVICE_NAME: "api-gateway"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "900000"