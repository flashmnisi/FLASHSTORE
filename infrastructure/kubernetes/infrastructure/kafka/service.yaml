apiVersion: v1
kind: Service

metadata:
  name: kafka
  namespace: flashstore
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: flashstore

spec:
  clusterIP: None
  publishNotReadyAddresses: true

  selector:
    app: kafka

  ports:
    - name: broker
      port: 9092
      targetPort: 9092

    - name: controller
      port: 9093
      targetPort: 9093