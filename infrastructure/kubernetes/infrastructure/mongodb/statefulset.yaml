apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb
  namespace: flashstore

  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: flashstore

spec:
  serviceName: mongodb

  replicas: 1

  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      securityContext:
        fsGroup: 999

      containers:
        - name: mongodb

          image: mongo:7.0

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 27017
              name: mongodb

          env:

            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: flashstore-config
                  key: MONGO_DB

            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flashstore-secrets
                  key: MONGO_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flashstore-secrets
                  key: MONGO_ROOT_PASSWORD

          resources:
            requests:
              cpu: 250m
              memory: 512Mi

            limits:
              cpu: "1"
              memory: 1Gi

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 10

          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 20

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: standard

        resources:
          requests:
            storage: 5Gi