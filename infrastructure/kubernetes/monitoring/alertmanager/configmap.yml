apiVersion: v1
kind: ConfigMap

metadata:
  name: alertmanager-config
  namespace: monitoring

  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/instance: flashstore
    app.kubernetes.io/version: "0.28.1"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: flashstore
    app.kubernetes.io/managed-by: kubectl

  annotations:
    description: "Alertmanager configuration"

data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default

      group_by:
        - alertname
        - namespace

      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: default

    inhibit_rules: []