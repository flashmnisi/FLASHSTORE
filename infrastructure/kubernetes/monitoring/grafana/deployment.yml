apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana
  namespace: monitoring

  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: flashstore
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: flashstore
    app.kubernetes.io/managed-by: kubectl

spec:
  replicas: 1

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: flashstore

  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: flashstore
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: flashstore

    spec:
      serviceAccountName: prometheus

      terminationGracePeriodSeconds: 30

      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472

      containers:
        - name: grafana

          image: grafana/grafana:12.0.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - secretRef:
                name: grafana-secret

          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana

            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true

            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true

            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true

          startupProbe:
            httpGet:
              path: /api/health
              port: http

            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/health
              port: http

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: http

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 200m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage

        - name: datasources
          configMap:
            name: grafana-datasources

        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider

        - name: dashboards
          configMap:
            name: grafana-dashboards