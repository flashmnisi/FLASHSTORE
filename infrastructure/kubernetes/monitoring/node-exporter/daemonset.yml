apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: node-exporter
  namespace: monitoring

  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/instance: flashstore
    app.kubernetes.io/version: "1.8.2"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: flashstore
    app.kubernetes.io/managed-by: kubectl

  annotations:
    description: "Prometheus Node Exporter"

spec:
  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
      app.kubernetes.io/instance: flashstore

  updateStrategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-exporter
        app.kubernetes.io/instance: flashstore
        app.kubernetes.io/version: "1.8.2"
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: flashstore

    spec:
      serviceAccountName: prometheus

      hostNetwork: true
      hostPID: true

      dnsPolicy: ClusterFirstWithHostNet

      tolerations:
        - operator: Exists

      securityContext:
        runAsUser: 0

      containers:
        - name: node-exporter

          image: prom/node-exporter:v1.8.2
          imagePullPolicy: IfNotPresent

          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root

            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containerd/.+)($|/)
            - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|overlay|proc|pstore|securityfs|selinuxfs|sysfs|tracefs)$

          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics

            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5

          resources:
            requests:
              cpu: 100m
              memory: 100Mi

            limits:
              cpu: 300m
              memory: 200Mi

          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true

            - name: sys
              mountPath: /host/sys
              readOnly: true

            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true

      volumes:
        - name: proc
          hostPath:
            path: /proc

        - name: sys
          hostPath:
            path: /sys

        - name: root
          hostPath:
            path: /