apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: monitoring

  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: flashstore
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: flashstore
    app.kubernetes.io/managed-by: kubectl

  annotations:
    description: "Prometheus configuration for FlashStore Kubernetes monitoring"

data:

  prometheus.yml: |
    ###############################################################
    # Global Configuration
    ###############################################################

    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s

      external_labels:
        cluster: flashstore
        environment: development

    ###############################################################
    # Alertmanager
    ###############################################################

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    ###############################################################
    # Alert Rules
    ###############################################################

    rule_files:
      - /etc/prometheus/rules/*.yaml

    ###############################################################
    # Scrape Jobs
    ###############################################################

    scrape_configs:

      #############################################################
      # Prometheus
      #############################################################

      - job_name: prometheus

        static_configs:
          - targets:
              - localhost:9090

      #############################################################
      # Kubernetes API Server
      #############################################################

      - job_name: kubernetes-apiservers

        kubernetes_sd_configs:
          - role: endpoints

        scheme: https

        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        tls_config:
          insecure_skip_verify: true

        relabel_configs:

          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      #############################################################
      # Kubernetes Nodes
      #############################################################

      - job_name: kubernetes-nodes

        kubernetes_sd_configs:
          - role: node

        scheme: https

        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        tls_config:
          insecure_skip_verify: true

      #############################################################
      # Kubernetes Pods
      #############################################################

      - job_name: kubernetes-pods

        kubernetes_sd_configs:
          - role: pod

        relabel_configs:

          # Scrape only annotated Pods
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: true

          # Metrics path
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          # Metrics port
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          # Import Pod labels
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          # Namespace
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: kubernetes_namespace

          # Pod Name
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: kubernetes_pod

      #############################################################
      # Kubernetes Services
      #############################################################

      - job_name: kubernetes-services

        kubernetes_sd_configs:
          - role: service

        relabel_configs:

          - source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scrape
            action: keep
            regex: true

          - source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          - source_labels:
              - __address__
              - __meta_kubernetes_service_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          # Import Service labels
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)

          - source_labels:
              - __meta_kubernetes_namespace
            target_label: kubernetes_namespace

          - source_labels:
              - __meta_kubernetes_service_name
            target_label: kubernetes_service

      #############################################################
      # Node Exporter
      #############################################################

      - job_name: node-exporter

        static_configs:
          - targets:
              - node-exporter.monitoring.svc.cluster.local:9100

      #############################################################
      # kube-state-metrics
      #############################################################

      - job_name: kube-state-metrics

        static_configs:
          - targets:
              - kube-state-metrics.monitoring.svc.cluster.local:8080

      #############################################################
      # Alertmanager
      #############################################################

      - job_name: alertmanager

        static_configs:
          - targets:
              - alertmanager.monitoring.svc.cluster.local:9093