apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-rules
  namespace: monitoring

  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: flashstore
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: flashstore
    app.kubernetes.io/managed-by: kubectl

  annotations:
    description: "Prometheus alerting rules for FlashStore"

data:

  kubernetes.rules.yaml: |

    groups:

      #########################################################
      # Kubernetes Alerts
      #########################################################

      - name: kubernetes

        rules:

          #####################################################
          # Node Down
          #####################################################

          - alert: KubernetesNodeDown

            expr: up{job="kubernetes-nodes"} == 0

            for: 2m

            labels:
              severity: critical

            annotations:
              summary: "Kubernetes node is down"
              description: "A Kubernetes node has been unreachable for more than 2 minutes."

          #####################################################
          # Pod Crash Loop
          #####################################################

          - alert: PodCrashLooping

            expr: rate(kube_pod_container_status_restarts_total[5m]) > 0

            for: 5m

            labels:
              severity: warning

            annotations:
              summary: "Pod restarting frequently"
              description: "A pod is restarting repeatedly."

          #####################################################
          # Deployment Replicas
          #####################################################

          - alert: DeploymentReplicasMismatch

            expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas

            for: 5m

            labels:
              severity: warning

            annotations:
              summary: "Deployment has unavailable replicas"
              description: "Some replicas are unavailable."

      #########################################################
      # Prometheus Alerts
      #########################################################

      - name: prometheus

        rules:

          - alert: PrometheusTargetMissing

            expr: up == 0

            for: 2m

            labels:
              severity: critical

            annotations:
              summary: "Prometheus target unreachable"
              description: "One or more scrape targets are unreachable."

      #########################################################
      # Node Exporter Alerts
      #########################################################

      - name: node-exporter

        rules:

          #####################################################
          # High CPU Usage
          #####################################################

          - alert: HighCPUUsage

            expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90

            for: 5m

            labels:
              severity: warning

            annotations:
              summary: "High CPU usage"
              description: "CPU usage is above 90%."

          #####################################################
          # High Memory Usage
          #####################################################

          - alert: HighMemoryUsage

            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90

            for: 5m

            labels:
              severity: warning

            annotations:
              summary: "High memory usage"
              description: "Memory usage is above 90%."

          #####################################################
          # Low Disk Space
          #####################################################

          - alert: LowDiskSpace

            expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10

            for: 5m

            labels:
              severity: critical

            annotations:
              summary: "Low disk space"
              description: "Disk space is below 10%."

      #########################################################
      # FlashStore Services
      #########################################################

      - name: flashstore

        rules:

          #####################################################
          # Service Down
          #####################################################

          - alert: FlashStoreServiceDown

            expr: up{job=~"gateway|user-service|catalog-service|cart-service|order-service|payment-service|notification-service|analytics-service|inventory-service|search-service"} == 0

            for: 2m

            labels:
              severity: critical

            annotations:
              summary: "FlashStore service unavailable"
              description: "A FlashStore microservice is unreachable."

          #####################################################
          # High Request Latency
          #####################################################

          - alert: HighRequestLatency

            expr: histogram_quantile(
                    0.95,
                    sum(rate(http_request_duration_seconds_bucket[5m]))
                    by (le, job)
                  ) > 1

            for: 5m

            labels:
              severity: warning

            annotations:
              summary: "High request latency"
              description: "95th percentile request latency exceeds 1 second."

          #####################################################
          # High Error Rate
          #####################################################

          - alert: HighErrorRate

            expr: rate(http_requests_total{status=~"5.."}[5m]) > 5

            for: 5m

            labels:
              severity: critical

            annotations:
              summary: "High HTTP 5xx error rate"
              description: "The service is returning excessive server errors."