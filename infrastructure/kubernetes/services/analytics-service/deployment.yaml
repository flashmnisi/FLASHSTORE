apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service
  namespace: flashstore
  labels:
    app: analytics-service
    app.kubernetes.io/name: analytics-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: flashstore 

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service
        app.kubernetes.io/name: analytics-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: flashstore

    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Uncomment if Docker Hub repository is private
      #
      # imagePullSecrets:
      #   - name: dockerhub-secret

      containers:
        - name: analytics-service

          image: flashmnisi/flashstore-analytics:v1.0.2
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3006

          envFrom:
            - configMapRef:
                name: flashstore-config

            - secretRef:
                name: flashstore-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: 200m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /health
              port: 3006

            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3006

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 3006

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL