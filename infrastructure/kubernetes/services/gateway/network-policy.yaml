apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: gateway-network-policy
  namespace: flashstore
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: flashstore

spec:
  podSelector:
    matchLabels:
      app: gateway

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flashstore
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow communication inside namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flashstore

    # HTTPS
    - ports:
        - protocol: TCP
          port: 443

    # HTTP
    - ports:
        - protocol: TCP
          port: 80