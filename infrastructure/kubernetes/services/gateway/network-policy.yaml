apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: gateway-network-policy
  namespace: flashstore

spec:
  podSelector:
    matchLabels:
      app: gateway

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        # Internal services
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flashstore

        # NGINX Ingress Controller
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

      ports:
        - protocol: TCP
          port: 3000

  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flashstore

    - ports:
        - protocol: TCP
          port: 80

    - ports:
        - protocol: TCP
          port: 443