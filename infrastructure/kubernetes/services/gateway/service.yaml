apiVersion: v1
kind: Service

metadata:
  name: gateway
  namespace: flashstore
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: flashstore

spec:
  type: ClusterIP

  selector:
    app: gateway

  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000