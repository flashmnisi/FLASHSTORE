apiVersion: v1
kind: Service

metadata:
  name: notification-service
  namespace: flashstore
  labels:
    app: notification-service
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: flashstore

spec:
  type: ClusterIP

  selector:
    app: notification-service

  ports:
    - name: http
      protocol: TCP
      port: 3007
      targetPort: 3007