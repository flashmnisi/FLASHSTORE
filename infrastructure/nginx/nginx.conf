# apps/infrastructure/nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    # ==================== General ====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100;

    types_hash_max_size 2048;

    # ==================== Compression ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        image/svg+xml;

    # ==================== Logging ====================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time '
                    'rid=$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ==================== Upstream (Gateway) ====================
    upstream gateway_backend {
        least_conn;

        server gateway:3000 max_fails=3 fail_timeout=30s;

        # 🔥 Future scaling (just uncomment)
        # server gateway-2:3000;
        # server gateway-3:3000;

        keepalive 32;
    }

    # ==================== Server ====================
    server {
        listen 80;
        server_name localhost;

        # ==================== Limits ====================
        client_max_body_size 50m;
        client_body_timeout 60s;
        client_header_timeout 60s;
        send_timeout 60s;

        # ==================== Health Check ====================
        # 🔥 REAL upstream health check (your choice A)
        location /health {
            proxy_pass http://gateway_backend/health;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            access_log off;
        }

        # ==================== Static Files ====================
        location /assets/ {
            alias /app/uploads/;

            expires 30d;
            add_header Cache-Control "public, immutable";

            access_log off;
        }

        # ==================== API Gateway ====================
        location / {
            proxy_pass http://gateway_backend;

            # ================= Headers =================
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 🔥 Correlation ID (VERY IMPORTANT)
            proxy_set_header X-Request-ID $request_id;

            # ================= Timeouts =================
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 90s;

            # ================= Buffering =================
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;

            # ================= Keepalive =================
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # ================= WebSocket =================
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ==================== Error Handling ====================
        error_page 502 503 504 /50x.json;

        location = /50x.json {
            internal;
            default_type application/json;

            return 502 '{"success":false,"message":"Service unavailable","code":502}';
        }
    }

    # ==================== WebSocket Upgrade Map ====================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}

