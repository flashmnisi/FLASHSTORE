# apps/infrastructure/nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    # ==================== General Settings ====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;

    # ==================== Map for WebSocket ====================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==================== Compression ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain text/css text/xml image/svg+xml;

    # ==================== Logging (JSON) ====================
    log_format json escape=json
        '{"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"size":$body_bytes_sent,'
        '"rt":$request_time,'
        '"ut":$upstream_response_time,'
        '"rid":"$http_x_request_id"}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    # ==================== Upstream ====================
    upstream gateway_backend {
        least_conn;

        server gateway:3000 max_fails=2 fail_timeout=10s;

        # Scale horizontally easily
        # server gateway-2:3000;
        # server gateway-3:3000;

        keepalive 32;
    }

    # ==================== Main Server ====================
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10m;     # Default limit, increase only on upload routes
        client_body_timeout 60s;
        client_header_timeout 60s;
        send_timeout 60s;

        # ==================== Security Headers ====================
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ==================== Health Check ====================
        location /health {
            proxy_pass http://gateway_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ==================== Static Assets ====================
        location /assets/ {
            alias /app/uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ==================== Main API Proxy ====================
        location / {
            proxy_pass http://gateway_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 90s;

            # Buffering
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;

            # Keepalive & HTTP/1.1
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ==================== Error Handling ====================
        error_page 502 503 504 /50x.json;

        location = /50x.json {
            internal;
            default_type application/json;
            return 502 '{"success":false,"message":"Service temporarily unavailable","code":502}';
        }
    }
}